<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cat Chat Login | Smile Cattery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body class="auth-body">

<div class="auth-box">

<div class="auth-logo">

<i class="fa-solid fa-paw"></i>

</div>

<h1>Cat Chat</h1>

<p class="auth-subtitle">

Sign in or create a free account to join the discussion.

</p>

<input
id="username"
type="text"
placeholder="Choose a username">

<input
id="email"
type="email"
placeholder="Email address">

<input
id="password"
type="password"
placeholder="Password">

<div class="auth-buttons">

<button id="loginBtn" class="button outline">

Login

</button>

<button id="signupBtn" class="button">

Create Account

</button>

</div>

<p id="message"></p>

<a href="index.html" class="auth-back">

<i class="fa-solid fa-arrow-left"></i>

Back to Smile Cattery

</a>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
